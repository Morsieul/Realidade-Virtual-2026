<html>
<head>
<title> Quarta Experiência de RA usando marcador Personalizado.</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden">
<a-scene vr-mode-ui="enabled: false" embedded aris= "debugUIEnabled : false">
    <a-assets>
        <a-asset-item id="modelo" src="star.gltf"></asset-item>
    </a-assets>
  <a-marker a-marker type="pattern" url="pattern-A.patt>
      <a-entity id="modelo3D"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-model="#modelo"
      > 
      </a-entity>
      </a-marker>	
      <a-entity camera></a-entity>
</a-scene>
</body>
</html>
